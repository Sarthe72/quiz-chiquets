<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Quizz Chiquet's – Écran Hôte</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="questions.js"></script>
  <script src="photos.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── slideshow background ── */
    .bg-layer {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background-size: contain;
      background-position: center center;
      background-repeat: no-repeat;
      transition: none;
      z-index: 0;
    }
    .bg-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 1;
      transition: background .5s;
    }
    body > *:not(.bg-layer):not(.bg-overlay) { position: relative; z-index: 2; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d1a;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── screens ── */
    .screen { display: none; width: 100%; max-width: 1100px; padding: 24px; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    /* ── lobby ── */
    .logo { font-size: 3rem; font-weight: 900; color: #fbbf24; letter-spacing: -1px; margin-bottom: 6px; }
    .subtitle { color: rgba(255,255,255,.5); font-size: 1rem; margin-bottom: 30px; }
    .lobby-grid { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
    #qrcode { background: white; padding: 14px; border-radius: 14px; }
    #qrcode img, #qrcode canvas { display: block; }
    .join-label { font-size: 0.85rem; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: 1px; text-align: center; }
    .join-url { display: none; }
    .players-wrap { background: rgba(255,255,255,.06); border-radius: 12px; padding: 14px; min-height: 80px; text-align: center; }
    .players-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .chip { background: rgba(255,255,255,.15); padding: 6px 14px; border-radius: 20px; font-size: .9rem; cursor: pointer; user-select: none; }
    .chip.vip { background: rgba(251,191,36,.25); border: 1px solid #fbbf24; color: #fbbf24; }
    .player-count { color: rgba(255,255,255,.4); font-size: .85rem; margin-top: 8px; text-align: center; }

    /* ── buttons ── */
    .btn { padding: 13px 36px; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin: 6px; transition: opacity .15s; }
    .btn:hover { opacity: .88; }
    .btn-start { background: #22c55e; color: #fff; font-size: 1.3rem; padding: 16px 50px; }
    .btn-next  { background: #3b82f6; color: #fff; }
    .btn-reset { background: #ef4444; color: #fff; font-size: .85rem; padding: 9px 20px; }

    /* ── question screen ── */
    .q-meta { font-size: 1.2rem; font-weight: 700; color: #fbbf24; background: rgba(0,0,0,.4); padding: 6px 18px; border-radius: 20px; margin-bottom: 12px; }
    .timer-row { display: flex; align-items: center; gap: 16px; width: 100%; max-width: 900px; margin-bottom: 20px; }
    .timer-num { font-size: 2.8rem; font-weight: 900; color: #fbbf24; min-width: 64px; text-align: center; }
    .timer-bar { flex: 1; height: 12px; background: rgba(255,255,255,.15); border-radius: 6px; overflow: hidden; }
    .timer-fill { height: 100%; background: #fbbf24; border-radius: 6px; transition: width .1s linear; }
    .question-txt { font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: 28px; max-width: 900px; line-height: 1.3; }
    .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 900px; }
    .tile { padding: 22px 18px; border-radius: 14px; font-size: 1.3rem; font-weight: 600; text-align: center; line-height: 1.3; }
    .tile.A { background: #ef4444; }
    .tile.B { background: #3b82f6; }
    .tile.C { background: #f59e0b; }
    .tile.D { background: #22c55e; }
    .tile.wrong   { opacity: .25; }
    .tile.correct { outline: 4px solid #fff; transform: scale(1.03); }
    .answered-info { margin-top: 14px; font-size: 1rem; color: rgba(255,255,255,.5); }

    /* ── reveal ── */
    .reveal-stats { display: flex; gap: 24px; font-size: 1.1rem; margin: 16px 0 20px; }
    .stat-ok   { color: #22c55e; }
    .stat-bad  { color: #ef4444; }
    .stat-miss { color: #6b7280; }
    .correct-names { color: rgba(255,255,255,.65); font-size: .95rem; margin-bottom: 20px; }

    /* ── leaderboard ── */
    .lb { width: 100%; max-width: 640px; }
    .lb-item { display: flex; align-items: center; gap: 14px; padding: 12px 18px; margin: 7px 0; background: rgba(255,255,255,.08); border-radius: 10px; font-size: 1.15rem; }
    .lb-rank { width: 36px; text-align: center; font-size: 1.3rem; }
    .lb-name { flex: 1; }
    .lb-score { font-weight: 700; color: #fbbf24; }
    .lb-item.r1 { background: rgba(255,215,0,.18); border-left: 4px solid gold; }
    .lb-item.r2 { background: rgba(192,192,192,.15); border-left: 4px solid silver; }
    .lb-item.r3 { background: rgba(205,127,50,.15); border-left: 4px solid #cd7f32; }
  </style>
</head>
<body>

<!-- Slideshow background -->
<div class="bg-layer" id="bg-a"></div>
<div class="bg-layer" id="bg-b" style="opacity:0"></div>
<div class="bg-overlay"></div>

<!-- ══ LOBBY ══ -->
<div id="screen-lobby" class="screen active">
  <div class="logo">🎉 Quizz Chiquet's</div>
  <div class="lobby-grid">
    <div id="qrcode"></div>
    <div class="players-wrap" style="width:100%; max-width:600px;">
      <div class="join-label" style="margin-bottom:8px">Joueurs connectés</div>
      <div class="players-grid" id="players-chips"></div>
      <div class="player-count" id="player-count">0 joueur(s)</div>
    </div>
  </div>
  <div id="join-url" style="display:none">…</div>
  <div style="margin-top:24px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;">
    <button class="btn btn-start" onclick="startQuiz()">▶ Démarrer le Quiz</button>
<button class="btn btn-reset" onclick="resetGame()">↺ Réinitialiser</button>
  </div>
</div>

<!-- ══ QUESTION ══ -->
<!-- ══ INTRO ══ -->
<div id="screen-intro" class="screen" style="padding:0; position:relative; width:100vw; height:100vh; overflow:hidden;">
  <img src="photos/intro.jpg" style="width:100%; height:100%; object-fit:contain; display:block;">
  <div style="position:absolute; top:0; left:0; right:0; text-align:center; padding:40px 20px;">
    <span style="font-size:6rem; font-weight:900; color:#fff; text-shadow:0 4px 24px rgba(0,0,0,.9); letter-spacing:-2px;">Prêt au</span>
  </div>
</div>

<!-- ══ QUESTION ══ -->
<div id="screen-question" class="screen">
  <div class="q-meta" id="q-meta"></div>
  <div class="timer-row">
    <div class="timer-num" id="timer-num">20</div>
    <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
  </div>
  <div class="question-txt" id="q-text"></div>
  <div class="answers-grid" id="answers-grid"></div>
  <div class="answered-info" id="answered-info"></div>
</div>

<!-- ══ REVEAL ══ -->
<div id="screen-reveal" class="screen">
  <div class="question-txt" id="reveal-q" style="font-size:1.6rem; margin-bottom:14px"></div>
  <div class="answers-grid" id="reveal-answers" style="max-width:900px; width:100%"></div>
  <div class="reveal-stats" id="reveal-stats"></div>
  <div class="correct-names" id="correct-names"></div>
  <div id="bonus-section"></div>
  <button class="btn btn-next" id="btn-next" onclick="nextQuestion()">Suivant ➜</button>
</div>

<!-- ══ LEADERBOARD ══ -->
<div id="screen-end" class="screen">
  <div class="logo" style="margin-bottom:20px; font-size:2rem">🏆 Classement Final — Quizz Chiquet's</div>
  <div class="lb" id="leaderboard"></div>
  <div id="vip-section"></div>
  <button class="btn btn-reset" onclick="resetGame()" style="margin-top:28px">↺ Rejouer</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  FIREBASE CONFIG — Colle ici ta config Firebase
// ═══════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyAjqdOHwjElcJ7GI6f_RKHbVcsaj5THHhg",
  authDomain:        "quiz-chiquets.firebaseapp.com",
  databaseURL:       "https://quiz-chiquets-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "quiz-chiquets",
  storageBucket:     "quiz-chiquets.firebasestorage.app",
  messagingSenderId: "615486087207",
  appId:             "1:615486087207:web:0ea7fa5fa545f56746ee02"
};
// ═══════════════════════════════════════════════════════

firebase.initializeApp(firebaseConfig);
const db         = firebase.database();
const gameRef    = db.ref('game');
const playersRef = db.ref('players');

let currentPlayers = {};
let currentGame    = null;
let timerInterval  = null;

// Remet toujours au lobby à l'ouverture de host.html
db.ref('/').set({ game: { status: 'waiting', questionIndex: 0 }, players: {} });

// ── QR Code & player URL ──────────────────────────────
const playerUrl = window.location.href.replace('host.html', 'index.html');
document.getElementById('join-url').textContent = playerUrl;
new QRCode(document.getElementById('qrcode'), {
  text: playerUrl, width: 260, height: 260,
  colorDark: '#000', colorLight: '#fff'
});

// ── Realtime listeners ────────────────────────────────
playersRef.on('value', snap => {
  currentPlayers = snap.val() || {};
  refreshPlayerUI();
});

gameRef.on('value', snap => {
  currentGame = snap.val();
  if (!currentGame) return;
  if      (currentGame.status === 'waiting')  showScreen('lobby');
  else if (currentGame.status === 'question') showQuestionScreen(currentGame);
  else if (currentGame.status === 'reveal')   showRevealScreen(currentGame);
  else if (currentGame.status === 'end')      showEndScreen();
});

function toggleVip(uid, current) {
  playersRef.child(uid).update({ vip: !current });
}

function refreshPlayerUI() {
  const entries = Object.entries(currentPlayers);
  const list    = entries.map(([,p]) => p);
  const chips   = document.getElementById('players-chips');
  const count   = document.getElementById('player-count');
  if (chips) chips.innerHTML = entries.map(([uid, p]) =>
    `<div class="chip ${p.vip ? 'vip' : ''}" onclick="toggleVip('${uid}', ${!!p.vip})" title="Cliquer pour marquer comme marié(e)">
      ${p.name}${p.vip ? ' 💍' : ''}
    </div>`
  ).join('');
  if (count) count.textContent = `${list.length} joueur(s) — cliquer sur un nom pour le marquer 💍 marié(e)`;

  if (currentGame && currentGame.status === 'question') {
    const qi       = currentGame.questionIndex;
    const answered = list.filter(p => p.answers && p.answers[qi] !== undefined).length;
    const el = document.getElementById('answered-info');
    if (el) el.textContent = `${answered} / ${list.length} ont répondu`;
  }
}

// ── Screens ───────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// ── Start / next ──────────────────────────────────────
function startQuiz() {
  if (!confirm('Démarrer le quiz ?')) return;
  document.querySelector('.bg-overlay').style.background = 'rgba(0,0,0,0.62)';
  startSlideshow();
  showScreen('intro');
  setTimeout(() => launchQuestion(0), 4000);
}

function launchQuestion(index) {
  clearInterval(timerInterval);
  const timerEnd = Date.now() + QUIZ_CONFIG.timerSeconds * 1000;
  gameRef.set({ status: 'question', questionIndex: index, timerEnd });
}

// ── Question screen ───────────────────────────────────
function showQuestionScreen(game) {
  showScreen('question');
  clearInterval(timerInterval);
  const q      = QUESTIONS[game.questionIndex];
  const labels = ['A','B','C','D'];
  document.getElementById('q-meta').textContent   = `Question ${game.questionIndex + 1} / ${QUESTIONS.length}`;
  document.getElementById('q-text').textContent   = q.question;
  document.getElementById('answered-info').textContent = '';
  document.getElementById('answers-grid').innerHTML = q.options.map((opt, i) =>
    `<div class="tile ${labels[i]}">${labels[i]}. ${opt}</div>`
  ).join('');
  startTimer(game.timerEnd, () => {
    // Auto-reveal when timer ends
    gameRef.once('value', s => {
      const g = s.val();
      if (g && g.status === 'question' && g.questionIndex === game.questionIndex)
        gameRef.update({ status: 'reveal' });
    });
  });
}

// ── Timer ─────────────────────────────────────────────
function startTimer(timerEnd, onEnd) {
  const total = QUIZ_CONFIG.timerSeconds * 1000;
  timerInterval = setInterval(() => {
    const rem  = Math.max(0, timerEnd - Date.now());
    const secs = Math.ceil(rem / 1000);
    const pct  = (rem / total) * 100;
    const nd = document.getElementById('timer-num');
    const bf = document.getElementById('timer-fill');
    if (nd) nd.textContent    = secs;
    if (bf) bf.style.width    = pct + '%';
    if (bf) bf.style.background = pct > 40 ? '#fbbf24' : pct > 20 ? '#f97316' : '#ef4444';
    if (rem === 0) { clearInterval(timerInterval); onEnd(); }
  }, 100);
}

// ── Reveal screen ─────────────────────────────────────
function showRevealScreen(game) {
  clearInterval(timerInterval);
  showScreen('reveal');
  const q      = QUESTIONS[game.questionIndex];
  const labels = ['A','B','C','D'];
  document.getElementById('reveal-q').textContent = q.question;
  const allCorrect = q.correct === null;
  document.getElementById('reveal-answers').innerHTML = q.options.map((opt, i) =>
    `<div class="tile ${labels[i]} ${allCorrect || i === q.correct ? 'correct' : 'wrong'}">
      ${allCorrect || i === q.correct ? '✓ ' : ''}${labels[i]}. ${opt}
    </div>`
  ).join('');
  const isLast = game.questionIndex >= QUESTIONS.length - 1;
  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = isLast ? 'Voir le classement 🏆' : 'Suivant ➜';
  btnNext.disabled    = !!q.bonusInput;
  btnNext.style.opacity = q.bonusInput ? '0.35' : '1';

  // Score once per question via transaction
  const qi = game.questionIndex;
  gameRef.child(`scored/${qi}`).transaction(val => val ? undefined : true, (err, committed) => {
    if (!committed) return;
    const players = currentPlayers;
    const updates = {};

    // Sépare corrects et incorrects, trie les corrects par vitesse
    const correct = [];
    let wrongCount  = 0;
    let missedCount = 0;
    const allCorrect = q.correct === null;
    Object.entries(players).forEach(([uid, p]) => {
      const ans = p.answers ? p.answers[qi] : undefined;
      if (ans === undefined)                          missedCount++;
      else if (allCorrect || ans === q.correct)       correct.push({ uid, p, elapsed: (p.answerTime && p.answerTime[qi]) || 99999 });
      else                                            wrongCount++;
    });
    correct.sort((a, b) => a.elapsed - b.elapsed);

    // Attribution des points
    correct.forEach(({ uid, p }, rank) => {
      const bonus = q.noBonus ? 0 : (rank < QUIZ_CONFIG.bonusCount ? QUIZ_CONFIG.pointsBonus : 0);
      updates[`players/${uid}/score`] = (p.score || 0) + QUIZ_CONFIG.pointsCorrect + bonus;
    });
    if (Object.keys(updates).length) db.ref('/').update(updates);

    // Affiche les 3 plus rapides
    const top3 = correct.slice(0, QUIZ_CONFIG.bonusCount);
    const medals = ['🥇', '🥈', '🥉'];
    document.getElementById('correct-names').innerHTML = top3.length
      ? '<strong style="color:#fbbf24">⚡ Plus rapides :</strong> ' +
        top3.map((e, i) => `${medals[i]} ${e.p.name}`).join('  ')
      : '';

    // Bonus manuel
    document.getElementById('bonus-section').innerHTML = '';
    if (q.bonusInput) {
      playersRef.once('value', snap => {
        const allPlayers = snap.val() || {};
        const entries = Object.entries(allPlayers)
          .filter(([uid, p]) => p.bonusAnswers && p.bonusAnswers[qi] !== undefined);
        if (!entries.length) return;
        document.getElementById('bonus-section').innerHTML = `
          <div style="margin-top:16px; font-size:1rem; color:#fbbf24; font-weight:700">🎁 Bonus modèle exact</div>
          ${entries.map(([uid, p]) => `
            <div style="display:flex; align-items:center; gap:10px; margin-top:8px; background:rgba(255,255,255,.08); padding:8px 14px; border-radius:8px;">
              <span style="flex:1"><strong>${p.name}</strong> : "${p.bonusAnswers[qi]}"</span>
              <button onclick="awardBonus('${uid}', this)" style="background:#22c55e; color:#fff; border:none; border-radius:6px; padding:6px 14px; font-weight:700; cursor:pointer;">+1 pt</button>
            </div>
          `).join('')}
          <button onclick="unlockNext()" style="margin-top:14px; background:#3b82f6; color:#fff; border:none; border-radius:8px; padding:10px 24px; font-weight:700; cursor:pointer;">Bonus traités ✓</button>
        `;
      });
    } else {
      unlockNext();
    }

    // Stats corrects / faux / sans réponse
    const statParts = [];
    if (correct.length) statParts.push(`<span class="stat-ok">✓ ${correct.length} correct${correct.length > 1 ? 's' : ''}</span>`);
    if (wrongCount)     statParts.push(`<span class="stat-bad">✗ ${wrongCount} faux</span>`);
    if (missedCount)    statParts.push(`<span class="stat-miss">— ${missedCount} sans réponse</span>`);
    document.getElementById('reveal-stats').innerHTML = statParts.join('');
  });
}

// ── Next question ─────────────────────────────────────
function nextQuestion() {
  gameRef.once('value', s => {
    const g = s.val();
    const next = g.questionIndex + 1;
    if (next >= QUESTIONS.length) gameRef.update({ status: 'end' });
    else launchQuestion(next);
  });
}

// ── End screen ────────────────────────────────────────
function showEndScreen() {
  clearInterval(timerInterval);
  showScreen('end');
  const medals  = ['🥇','🥈','🥉'];
  const all     = Object.values(currentPlayers).sort((a,b) => (b.score||0) - (a.score||0));
  const regular = all.filter(p => !p.vip);
  const vips    = all.filter(p => p.vip);
  const n       = regular.length;
  const phrases = (i) => {
    if (i === 0)     return "Le vrai VIP de la soirée";
    if (i === 1)     return "Si proche... et si loin";
    if (i === 2)     return "Médaille de bronze, c'est déjà le champagne";
    if (i === n - 1) return "T'es sûr·e d'être venu·e au mariage ?";
    if (i === n - 2) return "Le buffet t'intéressait plus que la cérémonie";
    if (i === n - 3) return "T'as dû dormir pendant la cérémonie";
    return '';
  };
  document.getElementById('leaderboard').innerHTML = regular.map((p, i) => `
    <div class="lb-item ${i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : ''}">
      <span class="lb-rank">${medals[i] || (i+1)}</span>
      <span class="lb-name">${p.name}${phrases(i) ? `<br><small style="font-weight:400;color:rgba(255,255,255,.55);font-size:.75rem">${phrases(i)}</small>` : ''}</span>
      <span class="lb-score">${p.score || 0} pts</span>
    </div>`).join('');

  document.getElementById('vip-section').innerHTML = vips.length ? `
    <div style="margin-top:32px; width:100%; max-width:640px;">
      <div style="font-size:1.3rem; font-weight:700; color:#fbbf24; margin-bottom:12px; text-align:center">💍 Podium des Mariés</div>
      ${vips.map((p, i) => `
        <div class="lb-item ${i === 0 ? 'r1' : i === 1 ? 'r2' : ''}">
          <span class="lb-rank">${medals[i] || (i+1)}</span>
          <span class="lb-name">${p.name}</span>
          <span class="lb-score">${p.score || 0} pts</span>
        </div>`).join('')}
    </div>` : '';
}

// ── Débloque le bouton Suivant ────────────────────────
function unlockNext() {
  const btn = document.getElementById('btn-next');
  btn.disabled      = false;
  btn.style.opacity = '1';
  const unl = document.querySelector('#bonus-section button[onclick="unlockNext()"]');
  if (unl) { unl.textContent = '✓ Validé'; unl.disabled = true; unl.style.background = '#6b7280'; }
}

// ── Bonus manuel ──────────────────────────────────────
function awardBonus(uid, btn) {
  db.ref(`players/${uid}/score`).transaction(score => (score || 0) + 1);
  btn.disabled     = true;
  btn.textContent  = '✓';
  btn.style.background = '#6b7280';
}

// ── Reset ─────────────────────────────────────────────
function resetGame() {
  if (!confirm('Réinitialiser ? Tous les scores seront effacés.')) return;
  db.ref('/').set({ game: { status: 'waiting', questionIndex: 0 }, players: {} });
}
</script>

<!-- Audio fond musical -->
<audio id="bg-music" src="gymtonic.mp3" loop></audio>

<!-- Bouton reset discret -->
<button onclick="resetGame()" style="
  position:fixed; bottom:18px; left:18px; z-index:999;
  background:rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.3);
  border-radius:8px; padding:8px 14px; font-size:.8rem;
  color:rgba(255,255,255,.6); cursor:pointer;">↺ Reset</button>

<!-- Bouton mute flottant -->
<button id="music-btn" onclick="toggleMusic()" style="
  position:fixed; bottom:18px; right:18px;
  background:rgba(255,255,255,.12); border:none; border-radius:50%;
  width:48px; height:48px; font-size:1.4rem; cursor:pointer;
  color:#fff;" title="Musique">🎵</button>

<script>
  // ── Slideshow ──────────────────────────────────────
  const PHOTOS = SLIDESHOW_PHOTOS;
  let photoIdx      = 0;
  let activeLayer   = 'a';
  let slideshowInterval = null;
  const bgA = document.getElementById('bg-a');
  const bgB = document.getElementById('bg-b');

  // Photo fixe sur le lobby
  bgA.style.backgroundImage = `url(photos/p06.jpg)`;

  function nextSlide() {
    photoIdx = (photoIdx + 1) % PHOTOS.length;
    if (activeLayer === 'a') {
      bgB.style.backgroundImage = `url(${PHOTOS[photoIdx]})`;
      bgB.style.opacity = '1'; bgA.style.opacity = '0';
      activeLayer = 'b';
    } else {
      bgA.style.backgroundImage = `url(${PHOTOS[photoIdx]})`;
      bgA.style.opacity = '1'; bgB.style.opacity = '0';
      activeLayer = 'a';
    }
  }

  function startSlideshow() {
    if (slideshowInterval) return;
    slideshowInterval = setInterval(nextSlide, 20000);
  }

  const music = document.getElementById('bg-music');
  let musicOn = true;

  // Autoplay : démarre muet (autorisé par les navigateurs), puis démute après 1s
  music.muted = true;
  music.play().then(() => {
    setTimeout(() => { music.muted = false; }, 1000);
  }).catch(() => {
    // Si même muted est bloqué, on attend le premier clic
    document.addEventListener('click', () => {
      music.muted = false;
      music.play().catch(() => {});
    }, { once: true });
  });

  function toggleMusic() {
    if (musicOn) {
      music.pause();
      musicOn = false;
      document.getElementById('music-btn').textContent = '🔇';
      const btn = document.getElementById('music-toggle-btn');
      if (btn) { btn.textContent = '🎵 Lancer la musique'; btn.style.background = '#7c3aed'; }
    } else {
      music.play().catch(() => {});
      musicOn = true;
      document.getElementById('music-btn').textContent = '🎵';
      const btn = document.getElementById('music-toggle-btn');
      if (btn) { btn.textContent = '🔇 Couper la musique'; btn.style.background = '#374151'; }
    }
  }
</script>
</body>
</html>
