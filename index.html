<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Quizz Chiquet's</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="questions.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d1a;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .screen { display: none; width: 100%; max-width: 480px; flex-direction: column; align-items: center; text-align: center; }
    .screen.active { display: flex; }

    h2 { font-size: 1.7rem; font-weight: 800; color: #fbbf24; margin-bottom: 16px; }

    /* ── join ── */
    input[type=text] {
      width: 100%; padding: 16px; font-size: 1.4rem;
      border: 2px solid rgba(255,255,255,.2); border-radius: 12px;
      background: rgba(255,255,255,.1); color: #fff; text-align: center;
      margin-bottom: 14px; outline: none;
    }
    input[type=text]:focus { border-color: #fbbf24; }
    input::placeholder { color: rgba(255,255,255,.4); }
    .btn-join {
      width: 100%; padding: 16px; font-size: 1.2rem; font-weight: 700;
      border: none; border-radius: 12px; background: #fbbf24; color: #0d0d1a; cursor: pointer;
    }

    /* ── lobby ── */
    .big-icon { font-size: 4rem; margin: 20px 0; }
    .name-badge { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
    .waiting { color: rgba(255,255,255,.45); font-size: 1rem; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .pulse { animation: pulse 1.5s infinite; }

    /* ── timer bar ── */
    .timer-bar { width: 100%; height: 8px; background: rgba(255,255,255,.15); border-radius: 4px; margin: 12px 0; }
    .timer-fill { height: 100%; border-radius: 4px; background: #fbbf24; transition: width .1s linear; }

    /* ── question ── */
    .q-meta  { color: rgba(255,255,255,.4); font-size: .85rem; margin-bottom: 6px; }
    .q-timer { font-size: 1.5rem; font-weight: 800; color: #fbbf24; }
    .q-text  { font-size: 1.15rem; line-height: 1.4; margin: 14px 0; }
    .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
    .ans-btn {
      padding: 22px 10px; border: none; border-radius: 14px;
      font-size: 1rem; font-weight: 700; color: #fff; cursor: pointer;
      line-height: 1.3; transition: transform .1s, opacity .15s;
    }
    .ans-btn:active { transform: scale(.95); }
    .ans-btn.A { background: #ef4444; }
    .ans-btn.B { background: #3b82f6; }
    .ans-btn.C { background: #f59e0b; }
    .ans-btn.D { background: #22c55e; }
    .ans-btn:disabled { opacity: .45; cursor: default; }
    .ans-btn.selected { outline: 3px solid #fff; transform: scale(.97); }

    /* ── answered ── */
    .check { font-size: 4.5rem; margin: 16px 0; }

    /* ── reveal ── */
    .res-correct { color: #22c55e; font-size: 1.5rem; font-weight: 700; margin: 10px 0; }
    .res-wrong   { color: #ef4444; font-size: 1.5rem; font-weight: 700; margin: 10px 0; }
    .res-miss    { color: #6b7280; font-size: 1.3rem; margin: 10px 0; }
    .correct-box { background: rgba(34,197,94,.15); border: 2px solid #22c55e; border-radius: 12px; padding: 14px 18px; margin: 12px 0; font-size: 1.05rem; }
    .score-big   { font-size: 2.2rem; font-weight: 900; color: #fbbf24; margin: 10px 0; }
    .score-plus  { font-size: 1.1rem; color: rgba(255,255,255,.5); }

    /* ── end ── */
    .lb-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; margin: 6px 0; background: rgba(255,255,255,.08); border-radius: 10px; width: 100%; }
    .lb-rank { width: 28px; text-align: center; }
    .lb-name { flex: 1; text-align: left; }
    .lb-score { color: #fbbf24; font-weight: 700; }
    .lb-item.me { background: rgba(251,191,36,.15); border-left: 3px solid #fbbf24; }
    .lb-item.r1 { border-left: 4px solid gold; }
  </style>
</head>
<body>

<!-- JOIN -->
<div id="screen-join" class="screen active">
  <h2>🎉 Quizz Chiquet's</h2>
  <p style="color:rgba(255,255,255,.55); margin-bottom:22px">Entre ton prénom pour rejoindre !</p>
  <input type="text" id="name-input" placeholder="Ton prénom…" maxlength="20" autocomplete="off" />
  <button class="btn-join" onclick="joinGame()">Rejoindre !</button>
</div>

<!-- LOBBY -->
<div id="screen-lobby" class="screen">
  <h2>Tu es dans le quiz !</h2>
  <div class="big-icon pulse">⏳</div>
  <div class="name-badge" id="name-badge"></div>
  <div class="waiting" style="font-weight:600; color:#fbbf24; margin-bottom:4px">Quizz Chiquet's</div>
  <div class="waiting">En attente du démarrage…</div>
  <div class="waiting" id="player-count" style="margin-top:10px"></div>
</div>

<!-- QUESTION -->
<div id="screen-question" class="screen">
  <div class="q-meta" id="q-meta"></div>
  <div class="q-timer" id="q-timer">20</div>
  <div class="timer-bar"><div class="timer-fill" id="tf-q" style="width:100%"></div></div>
  <div class="q-text" id="q-text"></div>
  <div class="ans-grid" id="ans-grid"></div>
</div>

<!-- ANSWERED -->
<div id="screen-answered" class="screen">
  <div class="check">✅</div>
  <h2 style="color:#fff">Réponse enregistrée !</h2>
  <div class="waiting" style="margin-top:8px">En attente des autres joueurs…</div>
  <div class="timer-bar" style="margin-top:20px"><div class="timer-fill" id="tf-wait" style="width:100%"></div></div>
</div>

<!-- REVEAL -->
<div id="screen-reveal" class="screen">
  <div id="reveal-result"></div>
  <div class="correct-box" id="reveal-correct"></div>
  <div class="score-plus" id="score-plus"></div>
  <div class="score-big" id="score-big"></div>
  <div class="waiting" style="margin-top:10px">En attente de la prochaine question…</div>
</div>

<!-- END -->
<div id="screen-end" class="screen">
  <h2 style="margin-bottom:20px">🏆 Classement Final</h2>
  <div id="end-lb" style="width:100%"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  FIREBASE CONFIG — Même config que dans host.html
// ═══════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyAjqdOHwjElcJ7GI6f_RKHbVcsaj5THHhg",
  authDomain:        "quiz-chiquets.firebaseapp.com",
  databaseURL:       "https://quiz-chiquets-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "quiz-chiquets",
  storageBucket:     "quiz-chiquets.firebasestorage.app",
  messagingSenderId: "615486087207",
  appId:             "1:615486087207:web:0ea7fa5fa545f56746ee02"
};
// ═══════════════════════════════════════════════════════

firebase.initializeApp(firebaseConfig);
const db         = firebase.database();
const gameRef    = db.ref('game');
const playersRef = db.ref('players');

let myUid          = localStorage.getItem('quiz_uid');
let myName         = localStorage.getItem('quiz_name');
let timerInterval  = null;
let hasAnswered    = false;
let currentTimerEnd = 0;
let myScore        = 0;
let prevScore      = 0;

// Auto-rejoin if we already have an identity
if (myUid && myName) {
  db.ref(`players/${myUid}`).once('value', s => {
    if (s.exists()) { enterGame(); }
    else { localStorage.removeItem('quiz_uid'); localStorage.removeItem('quiz_name'); myUid = null; myName = null; }
  });
}

// ── Join ──────────────────────────────────────────────
function joinGame() {
  const val = document.getElementById('name-input').value.trim();
  if (!val) { document.getElementById('name-input').focus(); return; }
  myUid  = myUid  || 'p_' + Math.random().toString(36).slice(2, 11);
  myName = val;
  localStorage.setItem('quiz_uid',  myUid);
  localStorage.setItem('quiz_name', myName);
  playersRef.child(myUid).set({ name: myName, score: 0, answers: {}, answerTime: {} })
    .then(() => { enterGame(); showScreen('lobby'); });
}

function enterGame() {
  document.getElementById('name-badge').textContent = myName;
  gameRef.on('value',    onGameChange);
  playersRef.on('value', onPlayersChange);
  // Live score updates
  db.ref(`players/${myUid}/score`).on('value', s => {
    myScore = s.val() || 0;
    const el = document.getElementById('score-big');
    if (el) el.textContent = `Score : ${myScore} pts`;
  });
}

// ── Listeners ─────────────────────────────────────────
function onGameChange(snap) {
  const game = snap.val();
  if (!game) return;
  if      (game.status === 'waiting')  showScreen('lobby');
  else if (game.status === 'question') showQuestionScreen(game);
  else if (game.status === 'reveal')   showRevealScreen(game);
  else if (game.status === 'end')      showEndScreen();
}

function onPlayersChange(snap) {
  const players = snap.val() || {};
  const count   = Object.keys(players).length;
  const el = document.getElementById('player-count');
  if (el) el.textContent = `${count} joueur(s) dans la partie`;
}

// ── Question screen ───────────────────────────────────
function showQuestionScreen(game) {
  clearInterval(timerInterval);
  hasAnswered    = false;
  currentTimerEnd = game.timerEnd;
  showScreen('question');
  const q      = QUESTIONS[game.questionIndex];
  const labels = ['A','B','C','D'];
  document.getElementById('q-meta').textContent = `Question ${game.questionIndex + 1} / ${QUESTIONS.length}`;
  document.getElementById('q-text').textContent = q.question;
  document.getElementById('ans-grid').innerHTML = q.options.map((opt, i) =>
    `<button class="ans-btn ${labels[i]}" onclick="submitAnswer(${i}, ${game.questionIndex})">${labels[i]}. ${opt}</button>`
  ).join('');
  startTimer(game.timerEnd, 'q-timer', ['tf-q', 'tf-wait'], () => {
    if (!hasAnswered) showScreen('answered');
  });
}

// ── Submit answer ─────────────────────────────────────
function submitAnswer(idx, qi) {
  if (hasAnswered) return;
  if (Date.now() > currentTimerEnd) return;
  hasAnswered = true;
  prevScore = myScore;
  document.querySelectorAll('.ans-btn').forEach((b, i) => {
    b.disabled = true;
    if (i === idx) b.classList.add('selected');
  });
  showScreen('answered');
  const elapsed = QUIZ_CONFIG.timerSeconds * 1000 - Math.max(0, currentTimerEnd - Date.now());
  playersRef.child(myUid).update({
    [`answers/${qi}`]:    idx,
    [`answerTime/${qi}`]: elapsed
  });
}

// ── Reveal screen ─────────────────────────────────────
function showRevealScreen(game) {
  clearInterval(timerInterval);
  showScreen('reveal');
  const q      = QUESTIONS[game.questionIndex];
  const labels = ['A','B','C','D'];
  db.ref(`players/${myUid}`).once('value', s => {
    const p       = s.val() || {};
    const myAns   = p.answers ? p.answers[game.questionIndex] : undefined;
    const correct = q.correct;
    let resultHTML = '';
    if (myAns === undefined) {
      resultHTML = '<div class="res-miss">⏰ Pas de réponse</div>';
    } else if (myAns === correct) {
      resultHTML = '<div class="res-correct">✅ Bonne réponse !</div>';
    } else {
      resultHTML = '<div class="res-wrong">❌ Mauvaise réponse</div>';
    }
    document.getElementById('reveal-result').innerHTML  = resultHTML;
    document.getElementById('reveal-correct').innerHTML =
      `✓ Bonne réponse : <strong>${labels[correct]}. ${q.options[correct]}</strong>`;
    document.getElementById('score-plus').textContent =
      myScore > prevScore ? `+${myScore - prevScore} pts` : '';
    document.getElementById('score-big').textContent  = `Score : ${myScore} pts`;
  });
}

// ── End screen ────────────────────────────────────────
function showEndScreen() {
  clearInterval(timerInterval);
  showScreen('end');
  playersRef.once('value', s => {
    const players = s.val() || {};
    const medals  = ['🥇','🥈','🥉'];
    const sorted  = Object.entries(players).sort(([,a],[,b]) => (b.score||0) - (a.score||0));
    document.getElementById('end-lb').innerHTML = sorted.map(([uid, p], i) => `
      <div class="lb-item ${uid === myUid ? 'me' : ''} ${i === 0 ? 'r1' : ''}">
        <span class="lb-rank">${medals[i] || (i+1)}</span>
        <span class="lb-name">${p.name}${uid === myUid ? ' 👈' : ''}</span>
        <span class="lb-score">${p.score || 0} pts</span>
      </div>`).join('');
  });
}

// ── Timer ─────────────────────────────────────────────
function startTimer(timerEnd, numId, fillIds, onEnd) {
  const total = QUIZ_CONFIG.timerSeconds * 1000;
  timerInterval = setInterval(() => {
    const rem  = Math.max(0, timerEnd - Date.now());
    const pct  = (rem / total) * 100;
    const secs = Math.ceil(rem / 1000);
    const nd = document.getElementById(numId);
    if (nd) nd.textContent = secs;
    fillIds.forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.style.width      = pct + '%';
        el.style.background = pct > 40 ? '#fbbf24' : pct > 20 ? '#f97316' : '#ef4444';
      }
    });
    if (rem === 0) { clearInterval(timerInterval); onEnd(); }
  }, 100);
}

// ── Show screen ───────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// Enter key on name input
document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') joinGame(); });
</script>
</body>
</html>
